<!DOCTYPE html><html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitation Mariage Premium</title><style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ffe4e1, #fff0f5);
  user-select:none;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.page{
  background:white;
  border-radius:20px;
  padding:25px;
  margin-bottom:25px;
  box-shadow:0 0 20px rgba(0,0,0,0.15);
  border:5px solid gold;
  position:relative;
  overflow:hidden;
}

.title{
  text-align:center;
  font-size:34px;
  font-weight:bold;
  font-family:cursive;
  color:#b30059;
}

.sub{text-align:center;color:#444;}

.footer{
  text-align:center;
  font-size:11px;
  margin-top:25px;
  color:#333;
}

.ribbon{
  position:absolute;
  width:160%;
  height:60px;
  top:-20px;
  left:-30%;
  transform:rotate(-8deg);
  border-radius:50px;
}
.page1 .ribbon{background:linear-gradient(90deg,#4fc3f7,#81d4fa);} 
.page2 .ribbon{background:linear-gradient(90deg,#ffd54f,#fff176);} 
.page3 .ribbon{background:linear-gradient(90deg,#f48fb1,#f8bbd0);} 

/* HEART FRAME */
.heart-frame{
  width:220px;
  height:200px;
  margin:15px auto;
  cursor:pointer;
  clip-path: path('M110 30 C110 0, 0 0, 0 70 C0 140, 110 180, 110 200 C110 180, 220 140, 220 70 C220 0, 110 0, 110 30 Z');
  border:3px solid gold;
  overflow:hidden;
  background:#fff;
}

.heart-frame img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.wrap{
  display:block;
  text-align:justify;
  line-height:1.7;
}

.wrap img{
  width:120px;
  height:120px;
  object-fit:cover;
  border-radius:12px;
  margin:10px;
  float:left;
  cursor:pointer;
}

.wrap img.right{
  float:right;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

input[type=file]{display:none;}

</style></head>
<body><div class="container"><div class="page page1">
  <div class="ribbon"></div>  <div class="title">💍 Mariage de Rêve 💍</div>  <div class="heart-frame" onclick="upload(1)">
    <img id="img1">
  </div>  <p class="sub" contenteditable="true">Bienvenue à notre cérémonie d'amour ❤️</p>  <div class="wrap">
    <img id="p1img" onclick="upload(1)">
    <p contenteditable="true">Présentation des mariés 💖</p>
  </div>
</div><div class="page page2">
  <div class="ribbon"></div>  <div class="title">📅 Programme</div>  <div class="wrap">
    <img id="p2img" class="right" onclick="upload(2)">
    <p contenteditable="true">
      10h - Cérémonie 🕊️<br>
      12h - Photos 📸<br>
      14h - Réception 🎉
    </p>
  </div>
</div><div class="page page3">
  <div class="ribbon"></div>  <div class="title">💌 Remerciements</div>  <div class="wrap">
    <img id="p3img" onclick="upload(3)">
    <p contenteditable="true">Merci pour votre présence ❤️</p>
  </div>  <div class="footer">Créé par ets Lesfacilitateurs groupe What's+237670035609</div>
</div><button style="background:red;color:white;" onclick="askCode()">📄 Télécharger PDF</button>

</div><input type="file" id="file" accept="image/*"><script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script><script>
const file = document.getElementById('file');
let target = null;

function upload(n){
  target = n;
  file.click();
}

file.onchange = function(e){
  const f = e.target.files[0];
  if(!f) return;
  const url = URL.createObjectURL(f);

  if(target === 1){
    document.getElementById('img1').src = url;
    document.getElementById('p1img').src = url;
  }

  if(target === 2){
    document.getElementById('p2img').src = url;
  }

  if(target === 3){
    document.getElementById('p3img').src = url;
  }
}

function askCode(){
  const c = prompt("Code :");
  if(c === '233') downloadPDF();
  else if(c) alert("Code incorrect ❌");
}

function downloadPDF(){
  html2pdf().set({
    margin:10,
    filename:'invitation.pdf',
    html2canvas:{scale:2,useCORS:true},
    jsPDF:{unit:'mm',format:'a4'}
  }).from(document.querySelector('.container')).save();
}
</script></body>
  </html>
