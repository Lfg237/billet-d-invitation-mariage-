<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitation Mariage PRO ULTRA</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  user-select:none;
  background:linear-gradient(120deg,#fff,#ffe4e1,#e6f0ff);
}

.container{
  max-width:950px;
  margin:auto;
  padding:20px;
}

.page{
  background:white;
  border-radius:20px;
  padding:25px;
  margin-bottom:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
  position:relative;
  overflow:hidden;
  border:5px solid gold;
}

/* RIBBONS */
.page1{border-color:gold; background:linear-gradient(#fff,#fffaf0);} 
.page2{border-color:#ff69b4; background:linear-gradient(#fff,#fff0f5);} 
.page3{border-color:#1e3a8a; background:linear-gradient(#fff,#eef5ff);} 

.ribbon{
  position:absolute;
  width:170%;
  height:60px;
  top:-25px;
  left:-35%;
  transform:rotate(-8deg);
  border-radius:50px;
  opacity:0.9;
}

.page1 .ribbon{background:linear-gradient(90deg,#ffd700,#fff8dc);} 
.page2 .ribbon{background:linear-gradient(90deg,#ff69b4,#ffc0cb);} 
.page3 .ribbon{background:linear-gradient(90deg,#1e3a8a,#60a5fa);} 

.title{
  text-align:center;
  font-size:34px;
  font-weight:bold;
  font-family:cursive;
  color:#b30059;
}

.footer{
  text-align:center;
  font-size:11px;
  margin-top:20px;
  color:#444;
}

.heart{
  width:220px;
  height:200px;
  margin:15px auto;
  cursor:pointer;
  clip-path: path('M110 30 C110 0,0 0,0 70 C0 140,110 180,110 200 C110 180,220 140,220 70 C220 0,110 0,110 30 Z');
  border:3px solid gold;
  overflow:hidden;
  background:#fff;
}

.heart img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.wrap{
  text-align:justify;
  line-height:1.7;
}

.wrap img{
  width:110px;
  height:110px;
  object-fit:cover;
  border-radius:15px;
  float:left;
  margin:10px 15px 10px 0;
  box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

.wrap img.right{
  float:right;
  margin:10px 0 10px 15px;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="container" id="doc">

<!-- PAGE 1 -->
<div class="page page1">
  <div class="ribbon"></div>
  <div class="title" contenteditable="true">💎 Mariage Prestige 💎</div>

  <div class="heart">
    <img id="img1">
  </div>

  <div class="wrap">
    <img id="p1img">
    <p contenteditable="true">Célébration élégante et raffinée ✨</p>
  </div>
</div>

<!-- PAGE 2 -->
<div class="page page2">
  <div class="ribbon"></div>
  <div class="title" contenteditable="true">🌹 Programme Floral 🌹</div>

  <div class="wrap">
    <img id="p2img" class="right">
    <p contenteditable="true">
      10h Cérémonie 🕊️<br>
      12h Photos 📸<br>
      14h Réception 🎉
    </p>
  </div>
</div>

<!-- PAGE 3 -->
<div class="page page3">
  <div class="ribbon"></div>
  <div class="title" contenteditable="true">👑 Remerciements 👑</div>

  <div class="wrap">
    <img id="p3img">
    <p contenteditable="true">Merci pour votre présence 💙</p>
  </div>

  <div class="footer">
    Créé par ets Lesfacilitateurs groupe What's +237670035609
  </div>
</div>

<button style="background:red;color:white;" onclick="askCode()">📄 Télécharger PDF</button>

</div>

<input type="file" id="file" accept="image/*">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

let target=null;
const file=document.getElementById('file');

/* IMAGE UPLOAD */
file.onchange=e=>{
const url=URL.createObjectURL(e.target.files[0]);
if(target===1){img1.src=url;p1img.src=url;}
if(target===2){p2img.src=url;}
if(target===3){p3img.src=url;}
}

function upload(n){target=n;file.click();}

/* CODE */
function askCode(){
let c=prompt("Code 233 ?");
if(c==="233") downloadPDF();
else alert("Code incorrect");
}

/* FIX PDF HD + NON VIDE */
async function downloadPDF(){

const pages=document.querySelectorAll('.page');
const {jsPDF}=window.jspdf;

const pdf=new jsPDF('p','mm',[105,148]); // A6

for(let i=0;i<pages.length;i++){

const canvas=await html2canvas(pages[i],{
scale:3,
useCORS:true,
backgroundColor:"#ffffff"
});

const img=canvas.toDataURL("image/jpeg",1.0);

pdf.addImage(img,'JPEG',0,0,105,148);

if(i<pages.length-1) pdf.addPage();
}

pdf.save("invitation-mariage.pdf");
}

</script>

</body>
</html>
