<!DOCTYPE html><html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitation Mariage PRO ULTRA</title><style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  user-select:none;
  background:linear-gradient(120deg,#fff,#ffe4e1,#e6f0ff);
}

.container{
  max-width:950px;
  margin:auto;
  padding:20px;
}

.page{
  background:white;
  border-radius:20px;
  padding:25px;
  margin-bottom:25px;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
  position:relative;
  overflow:hidden;
  border:5px solid gold;
}

.page1{border-color:gold; background:linear-gradient(#fff,#fffaf0);} 
.page2{border-color:#ff69b4; background:linear-gradient(#fff,#fff0f5);} 
.page3{border-color:#1e3a8a; background:linear-gradient(#fff,#eef5ff);} 

.ribbon{
  position:absolute;
  width:170%;
  height:60px;
  top:-25px;
  left:-35%;
  transform:rotate(-8deg);
  border-radius:50px;
  opacity:0.9;
}
.page1 .ribbon{background:linear-gradient(90deg,#ffd700,#fff8dc);} 
.page2 .ribbon{background:linear-gradient(90deg,#ff69b4,#ffc0cb);} 
.page3 .ribbon{background:linear-gradient(90deg,#1e3a8a,#60a5fa);} 

.title{
  text-align:center;
  font-size:34px;
  font-weight:bold;
  font-family:cursive;
  color:#b30059;
}

.footer{
  text-align:center;
  font-size:11px;
  margin-top:20px;
  color:#444;
}

.heart{
  width:220px;
  height:200px;
  margin:15px auto;
  cursor:pointer;
  clip-path: path('M110 30 C110 0,0 0,0 70 C0 140,110 180,110 200 C110 180,220 140,220 70 C220 0,110 0,110 30 Z');
  border:3px solid gold;
  overflow:hidden;
  background:#fff;
}

.heart img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.wrap{
  text-align:justify;
  line-height:1.7;
}

.wrap img{
  width:110px;
  height:110px;
  object-fit:cover;
  border-radius:15px;
  float:left;
  margin:10px 15px 10px 0;
  box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

.wrap img.right{
  float:right;
  margin:10px 0 10px 15px;
}

input[type=file]{display:none;}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

</style></head>
<body><div class="container"><div class="page page1">
  <div class="ribbon"></div>
  <div class="title" contenteditable="true">💎 Mariage Prestige 💎</div>  <div class="heart" onclick="upload(1)">
    <img id="img1">
  </div>  <div class="wrap">
    <img id="p1img" onclick="upload(1)">
    <p contenteditable="true">Célébration élégante et raffinée ✨</p>
  </div>
</div><div class="page page2">
  <div class="ribbon"></div>
  <div class="title" contenteditable="true">🌹 Programme Floral 🌹</div>  <div class="wrap">
    <img id="p2img" class="right" onclick="upload(2)">
    <p contenteditable="true">
      10h Cérémonie 🕊️<br>
      12h Photos 📸<br>
      14h Réception 🎉
    </p>
  </div>
</div><div class="page page3">
  <div class="ribbon"></div>
  <div class="title" contenteditable="true">👑 Remerciements 👑</div>  <div class="wrap">
    <img id="p3img" onclick="upload(3)">
    <p contenteditable="true">Merci pour votre présence 💙</p>
  </div>  <div class="footer">Créé par ets Lesfacilitateurs groupe What's+237670035609</div>
</div><button style="background:red;color:white;" onclick="askCode()">📄 Télécharger PDF</button>

</div><input type="file" id="file" accept="image/*"><!-- LIBRAIRIES PDF --><script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script><script>
let target = null;
const file = document.getElementById('file');

function upload(n){
  target = n;
  file.click();
}

file.onchange = function(e){
  const url = URL.createObjectURL(e.target.files[0]);

  if(target === 1){
    document.getElementById('img1').src = url;
    document.getElementById('p1img').src = url;
  }
  if(target === 2){
    document.getElementById('p2img').src = url;
  }
  if(target === 3){
    document.getElementById('p3img').src = url;
  }
}

function askCode(){
  const c = prompt("Code :");
  if(c === '233') downloadPDF();
  else if(c) alert("Code incorrect ❌");
}



  
function downloadPDF() {

  const pages = document.querySelectorAll('.page');
  const { jsPDF } = window.jspdf;

  // 📄 A6 = 105 x 148 mm
  const pdf = new jsPDF('p', 'mm', 'a6');

  const pageWidth = 105;
  const pageHeight = 148;

  let current = 0;

  function render(index) {

    html2canvas(pages[index], {
      scale: 2,
      useCORS: true,
      backgroundColor: "#ffffff",
      windowWidth: pages[index].scrollWidth
    }).then(canvas => {

      const imgData = canvas.toDataURL("image/jpeg", 1.0);

      const imgWidth = pageWidth;
      const imgHeight = (canvas.height * imgWidth) / canvas.width;

      pdf.addImage(imgData, 'JPEG', 0, 0, imgWidth, imgHeight);

      current++;

      if (current < pages.length) {
        pdf.addPage();
        render(current);
      } else {
        pdf.save("invitation-mariage-A6.pdf");
      }

    });

  }

  render(0);
}
</script></body>
</html>
